desc: >-
  We open-sourced GUI-Anything, a sidecar Flow Observer for Claude Code that
  watches live session streams, visualizes explorations as timelines and
  flowcharts, and brings local wiki context back on demand without interrupting
  the coding flow.
descZh: >-
