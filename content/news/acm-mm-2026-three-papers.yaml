date: Jul 2026
title: Three papers accepted to ACM MM 2026
titleZh: 三篇论文被 ACM MM 2026 接收
type: Paper
typeZh: 论文
desc: >-
  VertiKV, PruneVAR, and SPECTRA are accepted to ACM MM 2026 — on
  vertical-integrity KV-cache compression for efficient multimodal long-context
  inference, training-free acceleration of visual autoregressive generation, and
  autonomous edge–cloud GUI grounding on device, respectively.
descZh: VertiKV、PruneVAR、SPECTRA 三篇论文被 ACM MM 2026 接收，分别聚焦高效多模态长上下文推理的 KV 缓存压缩、免训练的视觉自回归生成加速，以及端云协同的端侧自主 GUI 定位。
