  - id: video-production-buddy
    name: Video Production Buddy
    period: 2026–present
    periodZh: 2026 至今
    image: video-production-buddy.jpg
    imageAlt: Video Production Buddy
    desc: >-
      An open-source AI video production assistant that turns general-purpose
      agents into video production experts, with brief clarification, proposal
      gates, asset generation, composition, and review before expensive
      generation runs.
    descZh: 开源的 AI 视频制作助手，可将通用智能体转化为专业的视频制作专家：在进入高成本的生成环节之前，依次完成需求澄清、方案确认、素材生成、合成与审校。
