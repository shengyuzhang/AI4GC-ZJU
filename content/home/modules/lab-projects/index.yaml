items:
  - id: infigui-series
    name: InfiGUI Series
    period: 2024–present
    image: infigui-agent.svg
    imageAlt: InfiGUI series GUI agents
    desc: >-
      A family of compact GUI agents for computer use, evolving across three works:
      InfiGUIAgent — a multimodal generalist agent with native reasoning and reflection;
      InfiGUI-R1 — from reactive actors to deliberative reasoners via reinforcement learning;
      InfiGUI-G1 — stronger GUI grounding through adaptive exploration policy optimization.
    tags:
      - GUI Agents
      - Multimodal
    links:
      - label: InfiGUIAgent
        href: https://github.com/InfiXAI/InfiGUIAgent
      - label: InfiGUI-R1
        href: https://github.com/InfiXAI/InfiGUI-R1
      - label: InfiGUI-G1
        href: https://github.com/InfiXAI/InfiGUI-G1
  - id: deskcraft
    name: DeskCraft
    period: 2025–present
    image: deskcraft.png
    imageAlt: DeskCraft benchmark overview
    desc: >-
      A desktop GUI benchmark for professional workflows and human-in-the-loop
      collaboration, with 538 executable tasks across office, design, video,
      audio, 3D, and multi-app software.
    tags:
      - Computer Use
      - Benchmark
      - Agents
    links:
      - label: GitHub
        href: https://github.com/mrwwk/DeskCraft
      - label: Paper
        href: https://arxiv.org/abs/2606.03103
