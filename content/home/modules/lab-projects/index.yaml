        href: https://github.com/InfiXAI/InfiGUIAgent
      - label: InfiGUI-R1
        href: https://github.com/InfiXAI/InfiGUI-R1
      - label: InfiGUI-G1
        href: https://github.com/InfiXAI/InfiGUI-G1
  - id: deskcraft
    name: DeskCraft
    period: 2025–present
    periodZh: 2025 至今
    image: deskcraft.png
    imageAlt: DeskCraft benchmark overview
    desc: >-
      A desktop GUI benchmark for professional workflows and human-in-the-loop
      collaboration, with 538 executable tasks across office, design, video,
      audio, 3D, and multi-app software.
    descZh: 面向专业工作流与人机协作的桌面 GUI 基准，包含 538 个可执行任务，覆盖办公、设计、视频、音频、3D 及多应用协同等场景。
    tags:
